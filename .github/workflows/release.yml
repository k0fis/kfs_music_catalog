name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create server archive
        run: tar czf server.tar.gz server/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: server.tar.gz
          generate_release_notes: true
