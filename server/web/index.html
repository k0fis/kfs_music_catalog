<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>k-server katalog</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
}

h1 {
    font-size: 1.4em;
    color: #7f8fa6;
    margin-bottom: 16px;
    font-weight: 400;
}

h1 span { color: #e0e0e0; }

#search {
    width: 100%;
    padding: 14px 18px;
    font-size: 18px;
    font-family: inherit;
    background: #16213e;
    border: 2px solid #2a2a4a;
    border-radius: 8px;
    color: #e0e0e0;
    outline: none;
    transition: border-color 0.2s;
}

#search:focus { border-color: #4a6fa5; }
#search::placeholder { color: #555; }

.filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 12px 0;
}

.filter-btn {
    padding: 5px 12px;
    font-size: 13px;
    font-family: inherit;
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    color: #7f8fa6;
    cursor: pointer;
    transition: all 0.15s;
}

.filter-btn:hover { border-color: #4a6fa5; color: #e0e0e0; }
.filter-btn.active { background: #2a2a4a; border-color: #4a6fa5; color: #e0e0e0; }

.stats {
    font-size: 12px;
    color: #555;
    margin: 8px 0;
}

#results {
    list-style: none;
    margin-top: 8px;
}

#results li {
    padding: 8px 12px;
    border-bottom: 1px solid #1e1e3a;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.1s;
}

#results li:hover { background: #16213e; }

.cat-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    background: #2a2a4a;
    color: #7f8fa6;
    white-space: nowrap;
    min-width: 70px;
    text-align: center;
}

.cat-audiobooks { color: #e6a07c; border: 1px solid #e6a07c33; }
.cat-music { color: #82c4e6; border: 1px solid #82c4e633; }
.cat-comix { color: #e6e282; border: 1px solid #e6e28233; }
.cat-books { color: #82e6a0; border: 1px solid #82e6a033; }
.cat-pohadky { color: #d4a0e6; border: 1px solid #d4a0e633; }
.cat-movies { color: #e68282; border: 1px solid #e6828233; }
.cat-movies_doc { color: #e6a0a0; border: 1px solid #e6a0a033; }
.cat-bluray { color: #a0c4e6; border: 1px solid #a0c4e633; }

.item-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.item-name a {
    color: #e0e0e0;
    text-decoration: none;
}

.item-name a:hover { color: #fff; text-decoration: underline; }

mark {
    background: #4a6fa544;
    color: #fff;
    padding: 0 1px;
    border-radius: 2px;
}

.no-results {
    color: #555;
    padding: 40px;
    text-align: center;
}

@media (max-width: 600px) {
    .container { padding: 12px; }
    #search { font-size: 16px; padding: 12px; }
    #results li { padding: 6px 8px; }
}
</style>
</head>
<body>
<div class="container">
    <h1>k-server <span>/ katalog</span></h1>
    <input type="text" id="search" placeholder="hledej..." autofocus>
    <div class="filters" id="filters"></div>
    <div class="stats" id="stats"></div>
    <ul id="results"></ul>
</div>

<script>
// Fuse.js CDN - lightweight fuzzy search
</script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
(function() {
    const CATEGORY_LABELS = {
        audiobooks: 'audiobooks',
        music: 'music',
        comix: 'comix',
        books: 'books',
        pohadky: 'pohadky',
        movies: 'movies',
        movies_doc: 'docs',
        bluray: 'blu-ray'
    };

    let allItems = [];
    let fuse = null;
    let activeFilter = null;

    // Nacti data
    fetch('data.json')
        .then(r => r.json())
        .then(data => {
            allItems = data.items;
            initFuse();
            buildFilters();
            updateStats(data);
            render();
        })
        .catch(() => {
            document.getElementById('results').innerHTML =
                '<li class="no-results">Chyba pri nacitani data.json</li>';
        });

    function initFuse() {
        fuse = new Fuse(allItems, {
            keys: ['n'],
            threshold: 0.35,
            distance: 200,
            includeMatches: true,
            minMatchCharLength: 2
        });
    }

    function buildFilters() {
        const cats = {};
        allItems.forEach(item => {
            cats[item.c] = (cats[item.c] || 0) + 1;
        });

        const container = document.getElementById('filters');

        const allBtn = document.createElement('button');
        allBtn.className = 'filter-btn active';
        allBtn.textContent = 'vse (' + allItems.length + ')';
        allBtn.onclick = () => setFilter(null, allBtn);
        container.appendChild(allBtn);

        Object.keys(CATEGORY_LABELS).forEach(cat => {
            if (!cats[cat]) return;
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.textContent = CATEGORY_LABELS[cat] + ' (' + cats[cat] + ')';
            btn.onclick = () => setFilter(cat, btn);
            container.appendChild(btn);
        });
    }

    function setFilter(cat, btn) {
        activeFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function updateStats(data) {
        const date = new Date(data.generated);
        document.getElementById('stats').textContent =
            data.count + ' polozek | aktualizovano ' +
            date.toLocaleDateString('cs') + ' ' + date.toLocaleTimeString('cs');
    }

    function render() {
        const query = document.getElementById('search').value.trim();
        let results;

        if (query.length >= 2) {
            results = fuse.search(query, { limit: 100 });
            if (activeFilter) {
                results = results.filter(r => r.item.c === activeFilter);
            }
        } else {
            let items = activeFilter
                ? allItems.filter(i => i.c === activeFilter)
                : allItems;
            results = items.slice(0, 100).map(item => ({ item, matches: [] }));
        }

        const ul = document.getElementById('results');

        if (results.length === 0) {
            ul.innerHTML = '<li class="no-results">nic nenalezeno</li>';
            return;
        }

        ul.innerHTML = results.map(r => {
            const item = r.item;
            const catClass = 'cat-' + item.c;
            const label = CATEGORY_LABELS[item.c] || item.c;

            // Highlight matches
            let name = escapeHtml(item.n);
            if (r.matches && r.matches.length > 0) {
                name = highlightMatches(item.n, r.matches[0].indices);
            }

            // Link
            let nameHtml;
            if (item.l) {
                nameHtml = '<a href="' + escapeHtml(item.l) + '">' + name + '</a>';
            } else {
                nameHtml = name;
            }

            return '<li>' +
                '<span class="cat-tag ' + catClass + '">' + label + '</span>' +
                '<span class="item-name">' + nameHtml + '</span>' +
                '</li>';
        }).join('');
    }

    function highlightMatches(text, indices) {
        if (!indices || indices.length === 0) return escapeHtml(text);

        // Merge overlapping indices
        const merged = [];
        indices.forEach(([start, end]) => {
            if (merged.length && start <= merged[merged.length - 1][1] + 1) {
                merged[merged.length - 1][1] = Math.max(merged[merged.length - 1][1], end);
            } else {
                merged.push([start, end]);
            }
        });

        let result = '';
        let last = 0;
        merged.forEach(([start, end]) => {
            result += escapeHtml(text.slice(last, start));
            result += '<mark>' + escapeHtml(text.slice(start, end + 1)) + '</mark>';
            last = end + 1;
        });
        result += escapeHtml(text.slice(last));
        return result;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Debounced search
    let timer;
    document.getElementById('search').addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(render, 150);
    });

    // Keyboard shortcut: / to focus search
    document.addEventListener('keydown', e => {
        if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
            e.preventDefault();
            document.getElementById('search').focus();
        }
        if (e.key === 'Escape') {
            document.getElementById('search').value = '';
            render();
        }
    });
})();
</script>
</body>
</html>
